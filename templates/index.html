<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="dashboard-container single-box">
        <!-- Single Form Section -->
        <section class="form-section">
            <header class="form-header">
                <h1>Student Exam Score Predictor</h1>
            </header>

            <form action="/predict" method="POST">
                <div class="form-group">
                    <label for="hours_studied">HOURS STUDIED (Daily)</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" name="hours_studied" id="hours_studied" placeholder="e.g. 8.5" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="sleep_hours">SLEEP HOURS</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" name="sleep_hours" id="sleep_hours" placeholder="e.g. 7.0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="attendance_percent">ATTENDANCE (%)</label>
                    <div class="input-wrapper">
                        <input type="number" step="1" name="attendance_percent" id="attendance_percent" placeholder="e.g. 95" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="previous_scores">PREVIOUS SCORES</label>
                    <div class="input-wrapper">
                        <input type="number" step="0.1" name="previous_scores" id="previous_scores" placeholder="e.g. 88.5" required>
                    </div>
                </div>

                <button type="submit">Execute Prediction</button>
            </form>

            <div style="margin-top: 30px; font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 10px;">
                <div style="width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></div>
                System Status: Ready
            </div>
        </section>
    </main>
</body>
</html>
