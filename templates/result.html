<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result - Student Score Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="result-page">
    <main class="result-card-premium">
        <section class="animate-delay-1">
            <h3>Estimated Student Score</h3>
            <div class="score-display" id="score-value" data-target="{{ prediction }}">0.00</div>
            <p style="color: var(--text-muted); margin-bottom: 30px;" class="animate-delay-2">Great job! Based on your input, this is the predicted performance.</p>
            <a href="/" style="text-decoration: none;">
                <button type="button" class="animate-delay-2">Predict Another Score</button>
            </a>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <audio id="tick-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scoreElement = document.getElementById('score-value');
            const tickSound = document.getElementById('tick-sound');
            const successSound = document.getElementById('success-sound');
            const targetScore = parseFloat(scoreElement.getAttribute('data-target'));
            
            let currentScore = 0;
            const duration = 2000; // 2 seconds
            const startTime = performance.now();
            let lastTickValue = -1;

            function triggerConfetti() {
                const duration = 3 * 1000;
                const animationEnd = Date.now() + duration;
                const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

                const randomInRange = (min, max) => Math.random() * (max - min) + min;

                const interval = setInterval(function() {
                    const timeLeft = animationEnd - Date.now();

                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }

                    const particleCount = 50 * (timeLeft / duration);
                    confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                    confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
                }, 250);
            }

            function animate(currentTime) {
                const elapsedTime = currentTime - startTime;
                const progress = Math.min(elapsedTime / duration, 1);
                
                // Ease out cubic
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                currentScore = easeProgress * targetScore;
                
                scoreElement.textContent = currentScore.toFixed(2);

                // Play tick sound for every integer increase
                const currentInt = Math.floor(currentScore);
                if (currentInt > lastTickValue) {
                    tickSound.currentTime = 0;
                    tickSound.play().catch(e => console.log('Audio wait for interaction'));
                    lastTickValue = currentInt;
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Final state
                    scoreElement.textContent = targetScore.toFixed(2);
                    successSound.play().catch(e => console.log('Audio wait for interaction'));
                    triggerConfetti();
                }
            }

            // Start animation
            requestAnimationFrame(animate);
        });
    </script>
</body>
</html>
